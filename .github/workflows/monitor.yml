name: Monitor pistas Nevados

on:
  schedule:
    - cron: "*/10 * * * *"   # cada 10 min: chequeo de cambios (avisa solo si algo cambió)
    - cron: "0 */2 * * *"    # cada 2 h: pulso de estado general (12 mensajes/día)
  workflow_dispatch:          # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write             # necesario para commitear estado.json de vuelta

concurrency:
  group: monitor-nevados
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Ejecutar scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 */2 * * *" ]; then
            python scraper.py --pulso
          else
            python scraper.py
          fi

      - name: Guardar estado (commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add estado.json
          if git diff --staged --quiet; then
            echo "Sin cambios de estado que guardar."
          else
            git commit -m "Actualiza estado de pistas [skip ci]"
            git push
          fi
